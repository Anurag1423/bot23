<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Chapter Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Novel Chapter Tracker</h1>
            <p class="subtitle">Fenrir Realm · NovelUpdates</p>
        </header>

        <!-- Add Novel -->
        <section>
            <h2>Add Novel</h2>
            <form id="addNovelForm" class="form">
                <div class="form-group">
                    <label for="novelName">Name</label>
                    <input type="text" id="novelName" name="name" required placeholder="Kill the Emperor">
                </div>
                <div class="form-group">
                    <label for="fenrirUrl">Fenrir URL</label>
                    <input type="url" id="fenrirUrl" name="fenrir_url" required placeholder="https://fenrirealm.com/series/...">
                </div>
                <div class="form-group">
                    <label for="nuUrl">NU URL</label>
                    <input type="url" id="nuUrl" name="nu_url" required placeholder="https://www.novelupdates.com/series/...">
                </div>
                <div class="form-group">
                    <label for="groupName">Group</label>
                    <input type="text" id="groupName" name="group_name" value="Fenrir Realm" placeholder="Group name">
                </div>
                <div class="form-group">
                    <label for="nuSeriesId">NU Series ID</label>
                    <input type="text" id="nuSeriesId" name="nu_series_id" placeholder="102429">
                </div>
                <div class="form-group">
                    <label for="nuGroupId">NU Group ID</label>
                    <input type="text" id="nuGroupId" name="nu_group_id" placeholder="78568" value="78568">
                </div>
                <div class="form-group">
                    <label></label>
                    <div><button type="submit" class="btn btn-primary">Add</button></div>
                </div>
            </form>
        </section>

        <!-- Sync -->
        <section>
            <h2>Sync</h2>
            <p class="sync-desc">Import all novels from the Fenrir Realm group on NovelUpdates.</p>
            <div class="sync-row">
                <button id="syncBtn" class="btn btn-primary" onclick="syncFenrir()">Sync from Fenrir Realm</button>
            </div>
            <div id="syncProgress" style="display:none;margin-top:12px;" class="sync-row">
                <div class="progress-bar" style="flex:1;"><div class="progress-fill" id="syncProgressFill"></div></div>
                <div class="progress-text" id="syncProgressText"></div>
            </div>
        </section>

        <!-- Novels -->
        <section class="novels-section">
            <div class="novels-header">
                <h2>Tracked Novels</h2>
                <input type="search" id="novelSearch" placeholder="search…" oninput="renderNovels()" autocomplete="off">
            </div>
            <div id="novelsList">
                <div class="loading">Loading...</div>
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div id="missingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Missing Chapters</h2>
                <button class="modal-close" onclick="closeMissingModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="missingChaptersList"></div>
                <div id="missingChaptersActions" class="modal-actions"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
